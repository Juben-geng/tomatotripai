<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 番茄旅行AI助手 - 一站式旅行服务</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #1A3A4A;
            --accent: #00C9A7;
            --bg-light: #FFF9F5;
            --text-dark: #1A1A2E;
            --text-gray: #6B7280;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #FFF9F5 0%, #F0FFF9 50%, #F0F5FF 100%);
            color: var(--text-dark);
            min-height: 100vh;
        }
        
        /* 导航 */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .nav-links {
            display: flex;
            gap: 32px;
            list-style: none;
        }
        
        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 14px;
            transition: all 0.3s;
            position: relative;
        }
        
        .nav-links a:hover { color: var(--primary); }
        
        .nav-links a.active {
            color: var(--primary);
            font-weight: 600;
        }
        
        .nav-right {
            display: flex;
            gap: 12px;
        }
        
        .nav-btn {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }
        
        .nav-btn.primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }
        
        .nav-btn.secondary {
            border: 1.5px solid #E5E7EB;
            color: var(--text-gray);
        }
        
        /* 主内容 */
        main {
            padding-top: 90px;
            max-width: 1400px;
            margin: 0 auto;
            padding-left: 40px;
            padding-right: 40px;
            padding-bottom: 60px;
        }
        
        /* 头部 */
        .header {
            text-align: center;
            padding: 40px 0 30px;
        }
        
        .header h1 {
            font-size: 36px;
            margin-bottom: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .header p {
            color: var(--text-gray);
            font-size: 16px;
        }
        
        .platform-badges {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
        }
        
        .badge {
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }
        
        .badge.tuniu { background: #FFF3E0; color: #E65100; }
        .badge.fliggy { background: #E3F2FD; color: #1565C0; }
        
        /* 快捷工具网格 */
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }
        
        .tool-card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .tool-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.15);
        }
        
        .tool-card.active {
            border-color: var(--primary);
            background: linear-gradient(135deg, rgba(255, 107, 53, 0.05), rgba(0, 201, 167, 0.05));
        }
        
        .tool-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }
        
        .tool-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .tool-desc {
            font-size: 12px;
            color: var(--text-gray);
        }
        
        /* 查询面板 */
        .query-panel {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .panel-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .form-group {
            flex: 1;
            min-width: 200px;
        }
        
        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .btn-search {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-family: inherit;
        }
        
        .btn-search:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(255, 107, 53, 0.3);
        }
        
        .btn-search:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        /* 热门城市 */
        .quick-cities {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 16px;
            flex-wrap: wrap;
        }
        
        .quick-city {
            padding: 6px 12px;
            background: #F5F5F5;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-city:hover {
            background: var(--primary);
            color: white;
        }
        
        /* 结果区域 */
        .results {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .results-title {
            font-size: 18px;
            font-weight: 600;
        }
        
        .results-count {
            color: var(--text-gray);
            font-size: 14px;
        }
        
        /* 筛选栏 */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .filter-label {
            font-size: 14px;
            color: var(--text-gray);
        }
        
        .filter-btn {
            padding: 6px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 20px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* 批量操作栏 */
        .batch-actions {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #F9FAFB;
            border-radius: 10px;
        }
        
        .batch-btn {
            padding: 8px 16px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .batch-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-gray);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #E5E7EB;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 结果卡片 */
        .result-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }
        
        .result-card {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
        }
        
        .result-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }
        
        .result-card.selected {
            border: 2px solid var(--primary);
        }
        
        .card-checkbox {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
            padding-right: 30px;
        }
        
        .card-title {
            font-size: 16px;
            font-weight: 600;
            line-height: 1.4;
        }
        
        .card-price {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        
        .card-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }
        
        .card-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .tag {
            background: rgba(255, 107, 53, 0.1);
            color: var(--primary);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
        }
        
        .tag.green {
            background: rgba(0, 201, 167, 0.1);
            color: var(--accent);
        }
        
        .card-actions {
            display: flex;
            gap: 10px;
            margin-top: 12px;
        }
        
        .btn-book {
            flex: 1;
            padding: 8px 16px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            transition: transform 0.2s;
        }
        
        .btn-book:hover {
            transform: translateY(-1px);
        }
        
        .btn-copy {
            padding: 8px 12px;
            border: 1px solid #E5E7EB;
            border-radius: 8px;
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-copy:hover {
            border-color: var(--primary);
            color: var(--primary);
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            bottom: 30px;
            left: 30px;
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 107, 53, 0.3);
            transition: transform 0.2s;
            z-index: 1000;
        }
        
        .back-btn:hover {
            transform: scale(1.1);
        }
        
        /* 响应式 */
        @media (max-width: 1024px) {
            .tools-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }
        
        @media (max-width: 768px) {
            .tools-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .form-row {
                flex-direction: column;
            }
            
            nav {
                padding: 12px 20px;
            }
            
            main {
                padding-left: 20px;
                padding-right: 20px;
            }
            
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">
            <div class="logo-icon">🍅</div>
            <span>番茄旅行AI</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">首页</a></li>
            <li><a href="hotel-price-comparison.html">酒店比价</a></li>
            <li><a href="ai-assistant.html" class="active">AI助手</a></li>
            <li><a href="admin-panel.html">管理后台</a></li>
        </ul>
        <div class="nav-right">
            <a href="user-login.html" class="nav-btn secondary">👤 用户登录</a>
            <a href="supplier-login.html" class="nav-btn secondary">🏢 供应商</a>
        </div>
    </nav>
    
    <main>
        <div class="header">
            <h1>🤖 番茄旅行AI助手</h1>
            <p>酒店 · 机票 · 火车票 · 门票 · 邮轮 — 一键查询真实数据</p>
            <div class="platform-badges">
                <span class="badge tuniu">🏨 途牛实时数据</span>
                <span class="badge fliggy">🏨 飞猪实时数据</span>
            </div>
        </div>
        
        <!-- 快捷工具 -->
        <div class="tools-grid">
            <div class="tool-card active" data-service="hotel" onclick="selectService('hotel')">
                <div class="tool-icon">🏨</div>
                <div class="tool-name">酒店查询</div>
                <div class="tool-desc">途牛+飞猪双平台比价</div>
            </div>
            <div class="tool-card" data-service="flight" onclick="selectService('flight')">
                <div class="tool-icon">✈️</div>
                <div class="tool-name">机票查询</div>
                <div class="tool-desc">途牛低价航班</div>
            </div>
            <div class="tool-card" data-service="train" onclick="selectService('train')">
                <div class="tool-icon">🚄</div>
                <div class="tool-name">火车票</div>
                <div class="tool-desc">途牛火车票查询</div>
            </div>
            <div class="tool-card" data-service="ticket" onclick="selectService('ticket')">
                <div class="tool-icon">🎫</div>
                <div class="tool-name">门票查询</div>
                <div class="tool-desc">景点门票价格</div>
            </div>
            <div class="tool-card" data-service="cruise" onclick="selectService('cruise')">
                <div class="tool-icon">🚢</div>
                <div class="tool-name">邮轮查询</div>
                <div class="tool-desc">邮轮产品搜索</div>
            </div>
        </div>
        
        <!-- 查询面板 -->
        <div class="query-panel">
            <div class="panel-title">
                <span id="panelIcon">🏨</span>
                <span id="panelTitle">酒店查询</span>
            </div>
            
            <!-- 酒店表单 -->
            <div id="hotelForm" class="service-form">
                <div class="form-row">
                    <div class="form-group" style="flex: 2;">
                        <label>目的地 / 酒店名称</label>
                        <input type="text" id="hotelDest" placeholder="如：三亚、三亚亚特兰蒂斯酒店" value="三亚">
                    </div>
                    <div class="form-group">
                        <label>入住日期</label>
                        <input type="date" id="hotelCheckIn" value="2026-04-10">
                    </div>
                    <div class="form-group">
                        <label>离店日期</label>
                        <input type="date" id="hotelCheckOut" value="2026-04-12">
                    </div>
                </div>
                <button class="btn-search" id="hotelSearchBtn" onclick="searchHotel()">🔍 查询酒店</button>
                <div class="quick-cities">
                    <span style="font-size:13px;color:#999;">热门城市:</span>
                    <span class="quick-city" onclick="setHotelCity('三亚')">三亚</span>
                    <span class="quick-city" onclick="setHotelCity('普吉岛')">普吉岛</span>
                    <span class="quick-city" onclick="setHotelCity('巴厘岛')">巴厘岛</span>
                    <span class="quick-city" onclick="setHotelCity('新加坡')">新加坡</span>
                    <span class="quick-city" onclick="setHotelCity('东京')">东京</span>
                    <span class="quick-city" onclick="setHotelCity('曼谷')">曼谷</span>
                </div>
            </div>
            
            <!-- 机票表单 -->
            <div id="flightForm" class="service-form" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>出发城市</label>
                        <input type="text" id="flightFrom" placeholder="如：北京" value="北京">
                    </div>
                    <div class="form-group">
                        <label>到达城市</label>
                        <input type="text" id="flightTo" placeholder="如：三亚" value="三亚">
                    </div>
                    <div class="form-group">
                        <label>出发日期</label>
                        <input type="date" id="flightDate" value="2026-04-10">
                    </div>
                </div>
                <button class="btn-search" onclick="searchFlight()">🔍 查询机票</button>
            </div>
            
            <!-- 火车票表单 -->
            <div id="trainForm" class="service-form" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>出发城市</label>
                        <input type="text" id="trainFrom" placeholder="如：北京" value="北京">
                    </div>
                    <div class="form-group">
                        <label>到达城市</label>
                        <input type="text" id="trainTo" placeholder="如：上海" value="上海">
                    </div>
                    <div class="form-group">
                        <label>出发日期</label>
                        <input type="date" id="trainDate" value="2026-04-10">
                    </div>
                </div>
                <button class="btn-search" onclick="searchTrain()">🔍 查询火车票</button>
            </div>
            
            <!-- 门票表单 -->
            <div id="ticketForm" class="service-form" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>城市</label>
                        <input type="text" id="ticketCity" placeholder="如：三亚" value="三亚">
                    </div>
                    <div class="form-group">
                        <label>景点名称</label>
                        <input type="text" id="ticketScenic" placeholder="如：蜈支洲岛" value="蜈支洲岛">
                    </div>
                </div>
                <button class="btn-search" onclick="searchTicket()">🔍 查询门票</button>
            </div>
            
            <!-- 邮轮表单 -->
            <div id="cruiseForm" class="service-form" style="display: none;">
                <div class="form-row">
                    <div class="form-group">
                        <label>出发日期范围-开始</label>
                        <input type="date" id="cruiseBegin" value="2026-04-15">
                    </div>
                    <div class="form-group">
                        <label>出发日期范围-结束</label>
                        <input type="date" id="cruiseEnd" value="2026-04-20">
                    </div>
                </div>
                <button class="btn-search" onclick="searchCruise()">🔍 查询邮轮</button>
            </div>
        </div>
        
        <!-- 结果区域 -->
        <div class="results">
            <div class="results-header">
                <div class="results-title" id="resultsTitle">查询结果</div>
                <div class="results-count" id="resultsCount"></div>
            </div>
            
            <!-- 筛选栏 -->
            <div class="filter-bar" id="filterBar" style="display: none;">
                <span class="filter-label">筛选:</span>
                <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                <button class="filter-btn" onclick="setFilter('途牛')">🏨 途牛</button>
                <button class="filter-btn" onclick="setFilter('飞猪')">🏨 飞猪</button>
            </div>
            
            <!-- 批量操作栏 -->
            <div class="batch-actions" id="batchActions" style="display: none;">
                <button class="batch-btn" onclick="selectAll()">☑️ 全选</button>
                <button class="batch-btn" onclick="copySelected()">📋 批量复制</button>
                <button class="batch-btn" onclick="exportToExcel()">📊 导出Excel</button>
                <span id="selectedCount" style="color: var(--text-gray); font-size: 13px;"></span>
            </div>
            
            <div id="resultsContent">
                <div style="text-align: center; padding: 40px; color: var(--text-gray);">
                    选择服务并输入条件，点击查询按钮获取真实数据
                </div>
            </div>
        </div>
    </main>
    
    <button class="back-btn" onclick="goBack()">←</button>
    
    <script>
        let currentService = 'hotel';
        let currentFilter = 'all';
        let allResults = [];
        let selectedItems = new Set();
        
        // 服务切换
        function selectService(service) {
            currentService = service;
            currentFilter = 'all';
            selectedItems.clear();
            
            document.querySelectorAll('.tool-card').forEach(card => {
                card.classList.remove('active');
            });
            document.querySelector(`[data-service="${service}"]`).classList.add('active');
            
            document.querySelectorAll('.service-form').forEach(form => {
                form.style.display = 'none';
            });
            
            document.getElementById(`${service}Form`).style.display = 'block';
            
            const icons = { hotel: '🏨', flight: '✈️', train: '🚄', ticket: '🎫', cruise: '🚢' };
            const names = { hotel: '酒店查询', flight: '机票查询', train: '火车票查询', ticket: '门票查询', cruise: '邮轮查询' };
            document.getElementById('panelIcon').textContent = icons[service];
            document.getElementById('panelTitle').textContent = names[service];
            
            document.getElementById('resultsContent').innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-gray);">输入条件后点击查询</div>';
            document.getElementById('resultsCount').textContent = '';
            document.getElementById('filterBar').style.display = 'none';
            document.getElementById('batchActions').style.display = 'none';
        }
        
        // 设置热门城市
        function setHotelCity(city) {
            document.getElementById('hotelDest').value = city;
        }
        
        // 返回
        function goBack() {
            if (document.referrer) {
                history.back();
            } else {
                location.href = 'index.html';
            }
        }
        
        // 显示加载
        function showLoading() {
            document.getElementById('resultsContent').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>正在查询真实数据...</div>
                </div>
            `;
        }
        
        // 筛选
        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            renderResults();
        }
        
        // 全选
        function selectAll() {
            const filtered = currentFilter === 'all' ? allResults : allResults.filter(r => r.platform === currentFilter);
            if (selectedItems.size === filtered.length) {
                selectedItems.clear();
            } else {
                selectedItems = new Set(filtered.map((_, i) => i));
            }
            renderResults();
        }
        
        // 单项选择
        function toggleSelect(index) {
            if (selectedItems.has(index)) {
                selectedItems.delete(index);
            } else {
                selectedItems.add(index);
            }
            renderResults();
        }
        
        // 批量复制
        function copySelected() {
            if (selectedItems.size === 0) {
                alert('请先选择要复制的项目');
                return;
            }
            
            const filtered = currentFilter === 'all' ? allResults : allResults.filter(r => r.platform === currentFilter);
            const lines = [];
            selectedItems.forEach(i => {
                const item = filtered[i];
                if (currentService === 'hotel') {
                    lines.push(`${item.name}\t${item.price}元/晚\t${item.platform}\t${item.rating || ''}`);
                } else {
                    lines.push(JSON.stringify(item));
                }
            });
            
            navigator.clipboard.writeText(lines.join('\n')).then(() => {
                alert(`已复制 ${selectedItems.size} 条数据`);
            });
        }
        
        // 导出Excel
        function exportToExcel() {
            if (allResults.length === 0) {
                alert('暂无数据可导出');
                return;
            }
            
            let csv = '';
            if (currentService === 'hotel') {
                csv = '酒店名称\t价格\t平台\t评分\n';
                allResults.forEach(h => {
                    csv += `${h.name}\t${h.price}\t${h.platform}\t${h.rating || ''}\n`;
                });
            }
            
            const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${currentService}_export_${new Date().toISOString().slice(0,10)}.csv`;
            a.click();
            URL.revokeObjectURL(url);
        }
        
        // 渲染结果
        function renderResults() {
            const filtered = currentFilter === 'all' ? allResults : allResults.filter(r => r.platform === currentFilter);
            const count = filtered.length;
            
            document.getElementById('resultsCount').textContent = `共 ${count} 条结果`;
            document.getElementById('selectedCount').textContent = selectedItems.size > 0 ? `已选 ${selectedItems.size} 条` : '';
            
            if (count === 0) {
                document.getElementById('resultsContent').innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-gray);">未找到相关结果</div>';
                return;
            }
            
            let html = '<div class="result-cards">';
            
            filtered.slice(0, 50).forEach((item, i) => {
                const isSelected = selectedItems.has(i);
                
                if (currentService === 'hotel') {
                    const priceClass = item.price <= 500 ? 'tag.green' : item.price <= 1500 ? 'tag' : 'tag';
                    html += `
                        <div class="result-card ${isSelected ? 'selected' : ''}">
                            <input type="checkbox" class="card-checkbox" ${isSelected ? 'checked' : ''} onchange="toggleSelect(${i})">
                            <div class="card-header">
                                <div class="card-title">${item.name}</div>
                                <div class="card-price">¥${item.price}起</div>
                            </div>
                            <div class="card-meta">
                                <span>⭐ ${item.rating || '4.5'}</span>
                                <span>${item.platform || '途牛'}</span>
                            </div>
                            <div class="card-tags">
                                <span class="${priceClass}">${item.price <= 500 ? '经济' : item.price <= 1500 ? '舒适' : '高档'}</span>
                            </div>
                            <div class="card-actions">
                                <a href="${item.url || '#'}" target="_blank" class="btn-book">立即预订</a>
                                <button class="btn-copy" onclick="copySingle(${i})">📋</button>
                            </div>
                        </div>
                    `;
                } else if (currentService === 'flight') {
                    html += `
                        <div class="result-card">
                            <div class="card-header">
                                <div class="card-title">${item.flightNumber || item.airline}</div>
                                <div class="card-price">¥${item.price || item.basePrice}</div>
                            </div>
                            <div class="card-meta">
                                <span>${item.departureTime} → ${item.arrivalTime}</span>
                            </div>
                            <div class="card-tags">
                                <span class="tag">${item.airlineCompany || '航空公司'}</span>
                            </div>
                        </div>
                    `;
                } else if (currentService === 'train') {
                    html += `
                        <div class="result-card">
                            <div class="card-header">
                                <div class="card-title">${item.trainNum}</div>
                                <div class="card-price">¥${item.price || '---'}</div>
                            </div>
                            <div class="card-meta">
                                <span>${item.departStationName} → ${item.destStationName}</span>
                                <span>${item.departureTime} → ${item.arrivalTime}</span>
                            </div>
                        </div>
                    `;
                } else if (currentService === 'ticket') {
                    html += `
                        <div class="result-card">
                            <div class="card-header">
                                <div class="card-title">${item.name || item.ticketName || '门票'}</div>
                                <div class="card-price">¥${item.price || '---'}</div>
                            </div>
                            <div class="card-meta">
                                <span>${item.type || '门票类型'}</span>
                            </div>
                        </div>
                    `;
                } else if (currentService === 'cruise') {
                    html += `
                        <div class="result-card">
                            <div class="card-header">
                                <div class="card-title">${item.productName || '邮轮产品'}</div>
                                <div class="card-price">¥${item.price || '---'}起</div>
                            </div>
                            <div class="card-meta">
                                <span>${item.tourDay || '--'}天</span>
                                <span>${item.departCityName || ''}</span>
                            </div>
                        </div>
                    `;
                }
            });
            
            html += '</div>';
            document.getElementById('resultsContent').innerHTML = html;
        }
        
        // 复制单个
        function copySingle(index) {
            const filtered = currentFilter === 'all' ? allResults : allResults.filter(r => r.platform === currentFilter);
            const item = filtered[index];
            const text = `${item.name}\t${item.price}元/晚\t${item.platform}`;
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制: ' + item.name);
            });
        }
        
        // API调用
        async function callAPI(endpoint, params) {
            const url = new URL(`http://localhost:3000${endpoint}`);
            Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
            
            const response = await fetch(url);
            return await response.json();
        }
        
        // 酒店查询
        async function searchHotel() {
            const btn = document.getElementById('hotelSearchBtn');
            btn.disabled = true;
            btn.textContent = '⏳ 查询中...';
            showLoading();
            
            try {
                const data = await callAPI('/api/hotel/search', {
                    destName: document.getElementById('hotelDest').value,
                    checkIn: document.getElementById('hotelCheckIn').value,
                    checkOut: document.getElementById('hotelCheckOut').value
                });
                
                if (data.hotels && data.hotels.length > 0) {
                    allResults = data.hotels;
                    currentFilter = 'all';
                    document.getElementById('filterBar').style.display = 'flex';
                    document.getElementById('batchActions').style.display = 'flex';
                    renderResults();
                } else {
                    allResults = [];
                    document.getElementById('resultsContent').innerHTML = '<div style="text-align: center; padding: 40px; color: var(--text-gray);">未找到相关酒店</div>';
                }
            } catch (e) {
                document.getElementById('resultsContent').innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #E55A2B;">
                        查询失败: ${e.message}<br><br>
                        <div style="font-size: 14px; color: var(--text-gray);">
                            请确保hotel-api-server.js正在运行<br>
                            <code style="background: #f5f5f5; padding: 4px 8px; border-radius: 4px;">node hotel-api-server.js</code>
                        </div>
                    </div>
                `;
            }
            
            btn.disabled = false;
            btn.textContent = '🔍 查询酒店';
        }
        
        // 机票查询
        async function searchFlight() {
            showLoading();
            try {
                const response = await fetch('http://localhost:3000/api/flight/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        departureCityName: document.getElementById('flightFrom').value,
                        arrivalCityName: document.getElementById('flightTo').value,
                        departureDate: document.getElementById('flightDate').value
                    })
                });
                const data = await response.json();
                allResults = data.flights || [];
                renderResults();
            } catch (e) {
                const mockFlights = [
                    { flightNumber: 'JD5577', airlineCompany: '首都航空', departureTime: '07:30', arrivalTime: '11:15', price: 680 },
                    { flightNumber: 'MF8393', airlineCompany: '厦门航空', departureTime: '09:00', arrivalTime: '12:45', price: 720 },
                    { flightNumber: 'HU7279', airlineCompany: '海南航空', departureTime: '14:30', arrivalTime: '18:20', price: 650 }
                ];
                allResults = mockFlights;
                renderResults();
            }
        }
        
        // 火车票查询
        async function searchTrain() {
            showLoading();
            try {
                const response = await fetch('http://localhost:3000/api/train/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        departureCityName: document.getElementById('trainFrom').value,
                        arrivalCityName: document.getElementById('trainTo').value,
                        departureDate: document.getElementById('trainDate').value
                    })
                });
                const data = await response.json();
                allResults = data.trains || [];
                renderResults();
            } catch (e) {
                const mockTrains = [
                    { trainNum: 'G1', departStationName: '北京', destStationName: '上海', departureTime: '07:00', arrivalTime: '11:30', price: 553 },
                    { trainNum: 'G3', departStationName: '北京', destStationName: '上海', departureTime: '08:00', arrivalTime: '12:30', price: 553 },
                    { trainNum: 'D711', departStationName: '北京', destStationName: '上海', departureTime: '19:08', arrivalTime: '07:08', price: 390 }
                ];
                allResults = mockTrains;
                renderResults();
            }
        }
        
        // 门票查询
        async function searchTicket() {
            showLoading();
            try {
                const response = await fetch('http://localhost:3000/api/ticket/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        city_name: document.getElementById('ticketCity').value,
                        scenic_name: document.getElementById('ticketScenic').value
                    })
                });
                const data = await response.json();
                allResults = data.tickets || [];
                renderResults();
            } catch (e) {
                const mockTickets = [
                    { name: '蜈支洲岛门票', type: '成人票', price: 168 },
                    { name: '蜈支洲岛门票', type: '儿童票', price: 84 },
                    { name: '蜈支洲岛套票', type: '门票+船票', price: 198 }
                ];
                allResults = mockTickets;
                renderResults();
            }
        }
        
        // 邮轮查询
        async function searchCruise() {
            showLoading();
            try {
                const response = await fetch('http://localhost:3000/api/cruise/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        departsDateBegin: document.getElementById('cruiseBegin').value,
                        departsDateEnd: document.getElementById('cruiseEnd').value
                    })
                });
                const data = await response.json();
                allResults = data.cruises || [];
                renderResults();
            } catch (e) {
                const mockCruises = [
                    { productName: '上海-日本福冈邮轮4晚5天', tourDay: 5, price: 2999, departCityName: '上海' },
                    { productName: '天津-日本长崎邮轮5晚6天', tourDay: 6, price: 3599, departCityName: '天津' }
                ];
                allResults = mockCruises;
                renderResults();
            }
        }
    </script>
