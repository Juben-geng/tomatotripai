<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>供应商登录 - 番茄旅行AI</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--primary:#FF6B35;--accent:#00C9A7;--bg-light:#FFF9F5;--text-dark:#1A1A2E;--text-gray:#6B7280;--border:rgba(26,58,74,0.1);--shadow:0 4px 20px rgba(0,0,0,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans SC',sans-serif;background:linear-gradient(135deg,#FFF9F5 0%,#F0FFF9 50%,#F0F5FF 100%);color:var(--text-dark);min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{width:100%;max-width:420px;padding:20px}
.card{background:white;border-radius:16px;padding:40px;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:32px}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,var(--primary),var(--accent));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px}
.logo-text{font-size:20px;font-weight:700;color:var(--primary)}
.role-badge{display:inline-block;background:#FFF3E0;color:#E65100;padding:6px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-bottom:24px}
.tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:2px solid var(--border)}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;font-weight:600;color:var(--text-gray);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.3s}
.tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.tab-content{display:none}
.tab-content.active{display:block}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:14px;font-weight:500;margin-bottom:8px;color:var(--text-dark)}
.form-input{width:100%;padding:12px 16px;border:1px solid var(--border);border-radius:8px;font-size:16px;font-family:inherit;transition:all 0.3s}
.form-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(255,107,53,0.1)}
.form-input.error{border-color:#ef4444}
.error-msg{color:#ef4444;font-size:12px;margin-top:4px;min-height:16px}
.btn{width:100%;padding:14px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;border:none;transition:all 0.3s;margin-top:8px}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:#E55A2B;transform:translateY(-2px);box-shadow:0 8px 20px rgba(255,107,53,0.3)}
.btn-primary:disabled{background:#ccc;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{background:var(--bg-light);color:var(--primary);border:2px solid var(--primary)}
.btn-secondary:hover{background:var(--primary);color:white}
.btn-loading{opacity:0.7;cursor:wait;pointer-events:none}
.divider{text-align:center;margin:20px 0;color:var(--text-gray);font-size:13px}
.divider::before,.divider::after{content:'';display:inline-block;width:40%;height:1px;background:var(--border);vertical-align:middle}
.divider::before{margin-right:10px}
.divider::after{margin-left:10px}
.quick-login{display:grid;grid-template-columns:1fr;gap:12px;margin-top:16px}
.quick-btn{padding:14px;border-radius:8px;border:1px solid var(--border);background:white;cursor:pointer;font-size:13px;transition:all 0.3s;text-align:left}
.quick-btn:hover{border-color:var(--primary);background:var(--bg-light)}
.quick-btn-title{font-weight:600;color:var(--text-dark)}
.quick-btn-desc{font-size:12px;color:var(--text-gray);margin-top:2px}
.link{color:var(--primary);text-decoration:none;cursor:pointer;font-weight:500}
.link:hover{text-decoration:underline}
.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text-gray)}
.success-page{display:none;text-align:center}
.success-icon{font-size:64px;margin-bottom:16px}
.success-title{font-size:24px;font-weight:700;margin-bottom:8px}
.success-desc{color:var(--text-gray);margin-bottom:16px}
.supplier-info{background:var(--bg-light);border-radius:12px;padding:16px;margin-bottom:16px;text-align:left}
.supplier-info-row{display:flex;justify-content:space-between;margin-bottom:8px;font-size:14px}
.supplier-info-row:last-child{margin-bottom:0}
.supplier-info-label{color:var(--text-gray)}
.supplier-info-value{font-weight:600;color:var(--text-dark)}
.info-box{background:#E8F5E9;border-left:4px solid var(--accent);padding:12px;border-radius:4px;margin-bottom:16px;font-size:13px;color:#2E7D32}
@media(max-width:480px){.card{padding:24px}.logo-text{font-size:18px}.form-input{font-size:16px}.quick-btn{padding:14px}.supplier-info-row{flex-direction:column;gap:2px}}
</style>
</head>
<body>
<div class="container">
<div class="card">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
<div class="logo">
<div class="logo-icon">🍅</div>
<div class="logo-text">番茄旅行AI</div>
</div>
<a href="index.html" style="font-size:12px;color:var(--primary);text-decoration:none;cursor:pointer">← 返回首页</a>
</div>

<div style="text-align:center;margin-bottom:24px">
<span class="role-badge">供应商后台</span>
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('login')">登录</div>
<div class="tab" onclick="switchTab('register')">注册</div>
</div>

<!-- 登录标签页 -->
<div id="login" class="tab-content active">
<div class="info-box">
💡 测试账号：gysyansh01 / 123456
</div>

<form onsubmit="handleLogin(event)">
<div class="form-group">
<label class="form-label">供应商账号</label>
<input type="text" class="form-input" id="loginUsername" placeholder="输入供应商账号" required autocomplete="username">
<div class="error-msg" id="loginUsernameError"></div>
</div>

<div class="form-group">
<label class="form-label">密码</label>
<input type="password" class="form-input" id="loginPassword" placeholder="输入密码" required autocomplete="current-password">
<div class="error-msg" id="loginPasswordError"></div>
</div>

<button type="submit" class="btn btn-primary" id="loginBtn">登录</button>
</form>

<div class="divider">或</div>

<div class="quick-login">
<button class="quick-btn" onclick="quickLogin('gysyansh01')">
<div class="quick-btn-title">🧪 测试账号</div>
<div class="quick-btn-desc">gysyansh01 / 123456</div>
</button>
</div>

<div style="text-align:center;margin-top:16px">
<span class="link" onclick="checkRegistrationStatus()">查询注册审核状态</span>
</div>

<div class="footer">
还没有账号？<span class="link" onclick="switchTab('register')">立即注册</span>
</div>
</div>

<!-- 注册标签页 -->
<div id="register" class="tab-content">
<div class="info-box">
📝 供应商注册需要提供真实信息，审核通过后才能使用
</div>

<form onsubmit="handleRegister(event)">
<div class="form-group">
<label class="form-label">供应商名称</label>
<input type="text" class="form-input" id="regSupplierName" placeholder="如：普吉岛阳光地接社" required>
<div class="error-msg" id="regSupplierNameError"></div>
</div>

<div class="form-group">
<label class="form-label">供应商账号</label>
<input type="text" class="form-input" id="regUsername" placeholder="输入账号（6-20字符）" required autocomplete="username">
<div class="error-msg" id="regUsernameError"></div>
</div>

<div class="form-group">
<label class="form-label">联系邮箱</label>
<input type="email" class="form-input" id="regEmail" placeholder="输入邮箱地址" required autocomplete="email">
<div class="error-msg" id="regEmailError"></div>
</div>

<div class="form-group">
<label class="form-label">联系电话</label>
<input type="tel" class="form-input" id="regPhone" placeholder="输入电话号码" required>
<div class="error-msg" id="regPhoneError"></div>
</div>

<div class="form-group">
<label class="form-label">密码</label>
<input type="password" class="form-input" id="regPassword" placeholder="输入密码（6位以上）" required autocomplete="new-password">
<div class="error-msg" id="regPasswordError"></div>
</div>

<div class="form-group">
<label class="form-label">确认密码</label>
<input type="password" class="form-input" id="regPasswordConfirm" placeholder="再次输入密码" required autocomplete="new-password">
<div class="error-msg" id="regPasswordConfirmError"></div>
</div>

<button type="submit" class="btn btn-primary" id="registerBtn">提交注册申请</button>
</form>

<div class="footer">
已有账号？<span class="link" onclick="switchTab('login')">立即登录</span>
</div>
</div>

<!-- 成功页面 -->
<div id="success" class="tab-content success-page">
<div class="success-icon">✅</div>
<div class="success-title">登录成功！</div>
<div class="success-desc">正在跳转到后台...</div>
<div class="supplier-info">
<div class="supplier-info-row">
<span class="supplier-info-label">供应商ID</span>
<span class="supplier-info-value" id="successSupplierId">-</span>
</div>
<div class="supplier-info-row">
<span class="supplier-info-label">供应商名称</span>
<span class="supplier-info-value" id="successSupplierName">-</span>
</div>
<div class="supplier-info-row">
<span class="supplier-info-label">账号</span>
<span class="supplier-info-value" id="successUsername">-</span>
</div>
</div>
<p id="redirectCountdown" style="color:var(--text-gray);font-size:13px;margin-bottom:12px">3秒后自动跳转...</p>
<button class="btn btn-secondary" onclick="cancelRedirect()" style="margin-bottom:8px">取消跳转</button>
<button class="btn btn-primary" onclick="goToAdmin()">立即进入后台</button>
</div>

</div>
</div>

<script>
// ========== 工具函数 ==========

function safeGetJSON(key,fallback){
  try{
    var data=localStorage.getItem(key);
    return data?JSON.parse(data):fallback;
  }catch(e){
    return fallback;
  }
}

function sanitize(str){
  if(typeof str!=='string')return '';
  var div=document.createElement('div');
  div.textContent=str;
  return div.innerHTML;
}

async function hashPassword(password){
  if(window.crypto&&window.crypto.subtle){
    var encoder=new TextEncoder();
    var data=encoder.encode(password+'_tomatotrip_salt');
    var hashBuffer=await crypto.subtle.digest('SHA-256',data);
    var hashArray=Array.from(new Uint8Array(hashBuffer));
    return hashArray.map(function(b){return b.toString(16).padStart(2,'0')}).join('');
  }else{
    var hash=5381;
    for(var i=0;i<password.length;i++){
      hash=((hash<<5)+hash)+password.charCodeAt(i);
    }
    return 'djb2_'+Math.abs(hash).toString(16);
  }
}

function showToast(message,type){
  type=type||'success';
  var toast=document.createElement('div');
  toast.style.cssText='position:fixed;top:20px;right:20px;padding:14px 24px;border-radius:8px;color:#fff;font-size:14px;font-weight:600;z-index:10000;transition:opacity 0.3s;max-width:320px;';
  toast.style.background=type==='success'?'#00C9A7':type==='error'?'#ef4444':'#FF6B35';
  toast.textContent=message;
  document.body.appendChild(toast);
  setTimeout(function(){toast.style.opacity='0'},2500);
  setTimeout(function(){toast.remove()},3000);
}

// ========== 状态 ==========

var redirectTimer=null;

// ========== 初始化供应商数据 ==========

async function initSuppliers(){
  var suppliers=safeGetJSON('suppliers',[]);
  if(suppliers.length===0){
    var hashedPw=await hashPassword('123456');
    suppliers=[
      {supplier_id:'s_gys001',supplier_name:'普吉岛阳光地接社',username:'gysyansh01',email:'sunny@phuket.com',phone:'66-81-234-5678',password:hashedPw,status:'approved',created_at:Date.now()},
      {supplier_id:'s_thai01',supplier_name:'泰享旅游',username:'thai_enjoy',email:'enjoy@thai.com',phone:'66-81-234-5679',password:hashedPw,status:'approved',created_at:Date.now()},
      {supplier_id:'s_sabah01',supplier_name:'沙巴风情地接社',username:'sabah_travel',email:'sabah@travel.com',phone:'60-87-234-5680',password:hashedPw,status:'approved',created_at:Date.now()}
    ];
    localStorage.setItem('suppliers',JSON.stringify(suppliers));
  }else{
    // Migration: if any password looks like plaintext (less than 20 chars), re-hash defaults
    var needsRehash=suppliers.some(function(s){return s.password&&s.password.length<20});
    if(needsRehash){
      var hashedPw=await hashPassword('123456');
      suppliers.forEach(function(s){
        if(s.password&&s.password.length<20){
          s.password=hashedPw;
        }
      });
      localStorage.setItem('suppliers',JSON.stringify(suppliers));
    }
  }
}

// ========== 生成供应商ID ==========

function generateSupplierId(){
  return 's_'+Math.random().toString(36).substr(2,6);
}

// ========== 切换标签页 ==========

function switchTab(tab){
  document.querySelectorAll('.tab-content').forEach(function(el){el.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(el){el.classList.remove('active')});
  document.getElementById(tab).classList.add('active');
  document.querySelector('[onclick="switchTab(\''+tab+'\')"]').classList.add('active');
  clearErrors();
}

// ========== 清除错误信息 ==========

function clearErrors(){
  document.querySelectorAll('.error-msg').forEach(function(el){el.textContent=''});
  document.querySelectorAll('.form-input').forEach(function(el){el.classList.remove('error')});
}

// ========== 登录处理 ==========

async function handleLogin(e){
  e.preventDefault();
  clearErrors();

  var btn=document.getElementById('loginBtn');
  var origText=btn.textContent;
  btn.disabled=true;
  btn.textContent='登录中...';
  btn.classList.add('btn-loading');

  var username=sanitize(document.getElementById('loginUsername').value.trim());
  var password=document.getElementById('loginPassword').value;

  if(!username){
    document.getElementById('loginUsernameError').textContent='请输入供应商账号';
    document.getElementById('loginUsername').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  if(!password){
    document.getElementById('loginPasswordError').textContent='请输入密码';
    document.getElementById('loginPassword').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  var suppliers=safeGetJSON('suppliers',[]);
  var supplier=suppliers.find(function(s){return s.username===username});

  if(!supplier){
    document.getElementById('loginUsernameError').textContent='供应商账号不存在';
    document.getElementById('loginUsername').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  var hashedPw=await hashPassword(password);

  if(supplier.password!==hashedPw){
    document.getElementById('loginPasswordError').textContent='密码错误';
    document.getElementById('loginPassword').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  if(supplier.status!=='approved'){
    var statusText=supplier.status==='pending'?'账号正在审核中，请耐心等待':'账号已被拒绝，请联系管理员';
    document.getElementById('loginUsernameError').textContent=statusText;
    document.getElementById('loginUsername').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  loginSuccess(supplier);
}

// ========== 注册处理 ==========

async function handleRegister(e){
  e.preventDefault();
  clearErrors();

  var btn=document.getElementById('registerBtn');
  var origText=btn.textContent;
  btn.disabled=true;
  btn.textContent='提交中...';
  btn.classList.add('btn-loading');

  var supplierName=sanitize(document.getElementById('regSupplierName').value.trim());
  var username=sanitize(document.getElementById('regUsername').value.trim());
  var email=sanitize(document.getElementById('regEmail').value.trim());
  var phone=sanitize(document.getElementById('regPhone').value.trim());
  var password=document.getElementById('regPassword').value;
  var passwordConfirm=document.getElementById('regPasswordConfirm').value;

  var hasError=false;

  if(supplierName.length<2){
    document.getElementById('regSupplierNameError').textContent='请输入有效的供应商名称';
    document.getElementById('regSupplierName').classList.add('error');
    hasError=true;
  }

  if(username.length<6||username.length>20){
    document.getElementById('regUsernameError').textContent='账号需要6-20个字符';
    document.getElementById('regUsername').classList.add('error');
    hasError=true;
  }

  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    document.getElementById('regEmailError').textContent='请输入有效的邮箱地址';
    document.getElementById('regEmail').classList.add('error');
    hasError=true;
  }

  if(phone.length<10){
    document.getElementById('regPhoneError').textContent='请输入有效的电话号码';
    document.getElementById('regPhone').classList.add('error');
    hasError=true;
  }

  if(password.length<6){
    document.getElementById('regPasswordError').textContent='密码需要至少6个字符';
    document.getElementById('regPassword').classList.add('error');
    hasError=true;
  }

  if(password!==passwordConfirm){
    document.getElementById('regPasswordConfirmError').textContent='两次输入的密码不一致';
    document.getElementById('regPasswordConfirm').classList.add('error');
    hasError=true;
  }

  if(hasError){
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  var suppliers=safeGetJSON('suppliers',[]);

  if(suppliers.find(function(s){return s.username===username})){
    document.getElementById('regUsernameError').textContent='账号已存在';
    document.getElementById('regUsername').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  if(suppliers.find(function(s){return s.email===email})){
    document.getElementById('regEmailError').textContent='邮箱已被注册';
    document.getElementById('regEmail').classList.add('error');
    btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
    return;
  }

  var hashedPw=await hashPassword(password);

  var newSupplier={
    supplier_id:generateSupplierId(),
    supplier_name:supplierName,
    username:username,
    email:email,
    phone:phone,
    password:hashedPw,
    status:'pending',
    created_at:Date.now()
  };

  suppliers.push(newSupplier);
  localStorage.setItem('suppliers',JSON.stringify(suppliers));

  showToast('注册申请已提交！我们会在24小时内审核您的申请','success');
  btn.disabled=false;btn.textContent=origText;btn.classList.remove('btn-loading');
  switchTab('login');
}

// ========== 快速登录 ==========

function quickLogin(username){
  var suppliers=safeGetJSON('suppliers',[]);
  var supplier=suppliers.find(function(s){return s.username===username});
  if(supplier){
    loginSuccess(supplier);
  }else{
    showToast('测试账号不存在，请刷新页面重试','error');
  }
}

// ========== 登录成功 ==========

function loginSuccess(supplier){
  localStorage.setItem('current_supplier',JSON.stringify({
    supplier_id:supplier.supplier_id,
    supplier_name:supplier.supplier_name,
    username:supplier.username,
    email:supplier.email,
    login_time:Date.now()
  }));

  document.getElementById('successSupplierId').textContent=supplier.supplier_id;
  document.getElementById('successSupplierName').textContent=supplier.supplier_name;
  document.getElementById('successUsername').textContent=supplier.username;

  switchTab('success');

  var seconds=3;
  var countdownEl=document.getElementById('redirectCountdown');
  redirectTimer=setInterval(function(){
    seconds--;
    if(seconds<=0){
      clearInterval(redirectTimer);
      redirectTimer=null;
      goToAdmin();
    }else{
      countdownEl.textContent=seconds+'秒后自动跳转...';
    }
  },1000);
}

// ========== 取消跳转 ==========

function cancelRedirect(){
  if(redirectTimer){clearInterval(redirectTimer);redirectTimer=null;}
  document.getElementById('redirectCountdown').textContent='已取消自动跳转';
}

// ========== 进入后台 ==========

function goToAdmin(){
  window.location.href='supplier-admin.html';
}

// ========== 查询注册审核状态 ==========

function checkRegistrationStatus(){
  var username=sanitize(document.getElementById('loginUsername').value.trim());
  if(!username){
    showToast('请先在上方输入供应商账号','error');
    return;
  }
  var suppliers=safeGetJSON('suppliers',[]);
  var supplier=suppliers.find(function(s){return s.username===username});
  if(!supplier){
    showToast('未找到该账号的注册信息','error');
    return;
  }
  var statusMap={pending:'⏳ 待审核 - 请耐心等待',approved:'✅ 已通过 - 可以登录',rejected:'❌ 已拒绝 - 请联系管理员'};
  showToast('账号 '+username+' 当前状态：'+(statusMap[supplier.status]||supplier.status),'info');
}

// ========== 页面加载 ==========

document.addEventListener('DOMContentLoaded',async function(){
  await initSuppliers();
});
</script>

<!-- 返回按钮 -->
<button onclick="goBack()" style="position:fixed;bottom:30px;left:30px;width:50px;height:50px;background:linear-gradient(135deg,#FF6B35,#E55A2B);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 15px rgba(255,107,53,0.4);z-index:9999;transition:all 0.2s" onmouseover="this.style.transform='scale(1.1)'" onmouseout="this.style.transform='scale(1)'">←</button>
<script>function goBack(){if(document.referrer&&document.referrer.indexOf(window.location.host)!==-1){history.back()}else{window.location.href='index.html'}}</script>
</body>
</html>
